version: '3.8'

services:
  web:
    # VITE_API_MODE is baked at build time (see docker/Dockerfile + .github/workflows/main.yml).
    # Setting it as runtime env here is a no-op: nginx serves pre-built static assets.
    image: ghcr.io/dobrador01/grid-48/web:latest
    container_name: grid48-web
    restart: always
    ports:
      - "80:80"
    labels:
      # Watchtower opt-in: only labelled containers are auto-updated. Drop this
      # label to pin a container to its current image (e.g. for canary).
      - "com.centurylinklabs.watchtower.enable=true"

  engine:
    image: ghcr.io/dobrador01/grid-48/engine:latest
    container_name: grid48-engine
    restart: always
    # `privileged: true` was overkill — it granted full kernel access. The udev
    # rule (deploy/udev/99-grid48-radio.rules) creates a stable symlink we can
    # pass through narrowly via `devices` + libudev read access for VID/PID
    # introspection. Removing privileged shrinks the blast radius if the engine
    # is ever compromised.
    devices:
      - "/dev/radio_grid48:/dev/radio_grid48"
    group_add:
      - "dialout"
    ports:
      - "3001:3001"
    volumes:
      - /mnt/usb/grid48:/app/data
      - /run/udev:/run/udev:ro  # serialport uses libudev for VID/PID lookup
    environment:
      - NODE_ENV=production
      - TZ=America/Sao_Paulo
      - ENGINE_PORT=3001
      - DB_PATH=/app/data/grid48.db
      - CONVEX_GW_URL=${CONVEX_GW_URL}
      - CONVEX_BEACON_URL=${CONVEX_BEACON_URL}
      - PSK_GATEWAY=${PSK_GATEWAY}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # --label-enable: only watch containers carrying the watchtower.enable label.
    # Removing the label from a service freezes it on its current image — useful
    # for canary deploys where you don't want auto-update during validation.
    command: --interval 3600 --label-enable
