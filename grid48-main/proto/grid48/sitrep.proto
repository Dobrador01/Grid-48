syntax = "proto3";

package grid48.sitrep;

// Option for typescript codegen
option go_package = "github.com/worldmonitor/proto/grid48/sitrep";

// Enums must be compact for RF transmission.
enum CategoriaSitrep {
  CATEGORIA_UNKNOWN = 0;
  ENERGIA = 1;
  CLIMA = 2;
  MOBILIDADE = 3;
}

// Compact mapping for locations (IBGE mapping should be handled application side)
// Using 1 byte representation.
enum LocalidadeMacro {
  LOCALIDADE_UNKNOWN = 0;
  FLORIANOPOLIS = 1;
  SAO_JOSE = 2;
  PALHOCA = 3;
  BIGUACU = 4;
}

// Request sent blindly to the network to trigger an AI SITREP
message SitrepRequest {
  string request_id = 1;
  CategoriaSitrep categoria = 2;
  LocalidadeMacro localidade = 3;
}

// Response generated by the cloud and sent back to the node
message SitrepResponse {
  string request_id = 1;
  CategoriaSitrep categoria = 2;
  LocalidadeMacro localidade = 3;
  
  // Compact value (e.g., risk level, percentage of power loss)
  // Could be 0-100 or mapped to an enum
  uint32 valor = 4;

  // How long this info is valid (in seconds)
  uint32 ttl_seconds = 5;
}
